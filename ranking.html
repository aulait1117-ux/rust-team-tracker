<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ランキング＆称号｜RAIDAR</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="alternate icon" href="favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #16140f; --surface: #201c15; --surface-raised: #26221a;
    --line: #2f2a20; --line-soft: #241f18;
    --text: #f0eadc; --text-muted: #9c937f; --text-faint: #726b59;
    --rust: #8fb0a0; --rust-bright: #a9c6b8; --moss: #8fb96e; --amber: #d6ab57; --alert: #e0705a;
    --accent: #8fb0a0;
    --font-display: "Shippori Mincho", "Yu Mincho", "Hiragino Mincho ProN", serif;
    --font-serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --font-body: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, system-ui, sans-serif;
    --font-mono: "Cascadia Mono", "Consolas", "SF Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--ink); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; letter-spacing: .01em; -webkit-font-smoothing: antialiased; }
  body { background-image:
      radial-gradient(1050px 620px at 92% -8%, rgba(143,176,160,.07), transparent 60%),
      radial-gradient(860px 540px at 5% 3%, rgba(214,171,87,.05), transparent 62%); }
  a { color: var(--rust-bright); }
  button { font-family: inherit; }
  :focus-visible { outline: 2px solid var(--rust-bright); outline-offset: 2px; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 0 20px 70px; }

  .page-head { padding: 26px 0 4px; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .page-head .eyebrow { display: block; margin-bottom: 4px; font-family: var(--font-serif); font-style: italic; font-size: 15px; letter-spacing: 0.1em; color: var(--accent); }
  .page-head h1 { margin: 0; font-family: var(--font-display); font-weight: 600; font-size: 26px; letter-spacing: 0.05em; }
  .hero-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--text-muted); font-size: 12.5px; padding: 7px 12px; border-radius: 3px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-ghost:hover { border-color: var(--rust); color: var(--rust-bright); }
  .btn-ghost[aria-current="page"] { border-color: var(--rust); color: var(--text); }

  .tabs { display: flex; gap: 6px; margin-top: 18px; flex-wrap: wrap; }
  .tab { background: transparent; border: 1px solid var(--line); color: var(--text-muted); font-size: 13px; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
  .tab.active { border-color: var(--rust); color: var(--text); background: var(--surface); }
  .panel { display: none; }
  .panel.active { display: block; }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 5px; padding: 16px 18px; margin-top: 16px; }
  .card > h2 { margin: 0 0 4px; font-family: var(--font-display); font-weight: 600; font-size: 16px; letter-spacing: .03em; }
  .sub { color: var(--text-muted); font-size: 12.5px; margin: 0 0 12px; }

  .filter-row { display: flex; gap: 6px; margin: 12px 0; flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 1px solid var(--line); color: var(--text-muted); font-size: 12px; padding: 5px 12px; border-radius: 3px; cursor: pointer; }
  .filter-btn.on { border-color: var(--moss); color: var(--text); }

  .rank-list { display: flex; flex-direction: column; }
  .rank-row { display: grid; grid-template-columns: 42px 74px 1fr auto; gap: 12px; align-items: center; padding: 11px 6px; border-bottom: 1px solid var(--line-soft); }
  .rank-row:last-child { border-bottom: none; }
  .rank-no { font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: var(--text-faint); text-align: center; }
  .rank-row.top1 .rank-no { color: #ffd479; }
  .rank-row.top2 .rank-no { color: #d8d8d8; }
  .rank-row.top3 .rank-no { color: #d69b57; }
  .rank-lv { font-family: var(--font-mono); font-size: 12px; border: 1px solid var(--line); border-radius: 3px; padding: 3px 6px; text-align: center; white-space: nowrap; }
  .rank-name { min-width: 0; }
  .rank-name .nm { font-weight: 600; }
  .rank-name .ti { display: block; font-size: 11.5px; margin-top: 1px; }
  .rank-name .tt { font-size: 10.5px; color: var(--text-faint); font-family: var(--font-mono); }
  .rank-exp { text-align: right; font-family: var(--font-mono); }
  .rank-exp b { font-size: 15px; color: var(--text); }
  .rank-exp small { display: block; font-size: 10.5px; color: var(--text-faint); }
  .side-tag { display: inline-block; font-size: 10px; font-family: var(--font-mono); border-radius: 2px; padding: 0 5px; margin-left: 6px; vertical-align: 1px; }
  .side-tag.friend { color: var(--moss); border: 1px solid var(--moss); }
  .side-tag.enemy { color: var(--alert); border: 1px solid var(--alert); }
  .empty { color: var(--text-faint); font-size: 13px; padding: 14px 4px; }

  .frank-row { display: grid; grid-template-columns: 42px 1fr auto; gap: 12px; align-items: center; padding: 10px 6px; border-bottom: 1px solid var(--line-soft); }
  .frank-row:last-child { border-bottom: none; }
  .farm-logs { display: flex; flex-direction: column; gap: 8px; }
  .flog { display: flex; gap: 12px; align-items: center; padding: 8px; border: 1px solid var(--line-soft); border-radius: 5px; background: var(--surface-raised); }
  .flog-thumb { width: 52px; height: 52px; object-fit: cover; border-radius: 4px; cursor: pointer; flex: none; border: 1px solid var(--line); }
  .flog-noimg { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 4px; flex: none; border: 1px dashed var(--line); color: var(--text-faint); font-size: 9.5px; }
  .flog-mid { min-width: 0; }
  .flog-top b { font-size: 13.5px; }
  .flog-date { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-left: 6px; }
  .flog-sum { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .table-scroll { overflow-x: auto; }
  .farm-name-block { margin-bottom: 16px; }
  .farm-name-head { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .farm-name-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); font-weight: 400; }
  .farm-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .farm-table th { text-align: left; color: var(--text-muted); font-weight: 600; font-size: 11px; padding: 6px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .farm-table td { padding: 8px 10px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; }
  .farm-table tr:last-child td { border-bottom: none; }
  .ft-date { font-family: var(--font-mono); color: var(--text-muted); white-space: nowrap; width: 74px; }
  .ft-shot { width: 56px; }
  .ft-thumb { width: 46px; height: 46px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid var(--line); display: block; }
  .ft-noimg { font-size: 10px; color: var(--text-faint); }
  .ft-sum { color: var(--text); line-height: 1.5; }

  .rarity-grid { display: flex; flex-direction: column; gap: 2px; }
  .rarity-item { display: grid; grid-template-columns: 16px 1fr auto; gap: 12px; align-items: center; padding: 9px 4px; border-bottom: 1px solid var(--line-soft); }
  .rarity-item:last-child { border-bottom: none; }
  .rarity-dot { width: 13px; height: 13px; border-radius: 50%; }
  .rarity-name { font-weight: 600; }
  .rarity-range { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .rarity-exp { font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); text-align: right; }

  .title-group { margin-top: 8px; border: 1px solid var(--line-soft); border-radius: 5px; overflow: hidden; }
  .title-group-head { width: 100%; text-align: left; background: var(--surface-raised); border: none; color: var(--text); font-family: var(--font-display); font-size: 14.5px; font-weight: 600; padding: 11px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .title-group-head:hover { color: var(--rust-bright); }
  .tg-arrow { color: var(--rust); font-size: 12px; width: 12px; }
  .tg-count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); font-weight: 400; }
  .title-group .chips { padding: 12px 14px; }
  .title-group.collapsed .chips { display: none; }
  .title-group h3 { margin: 0 0 4px; font-family: var(--font-display); font-size: 14px; font-weight: 600; }
  .cat-desc { font-size: 12px; color: var(--text-muted); margin: 0 0 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-family: var(--font-mono); font-size: 11px; border: 1px solid var(--line); border-radius: 3px; padding: 3px 9px; white-space: nowrap; }
  .chip .rq { color: var(--text-faint); margin-left: 6px; }
  .chip .xp { color: var(--moss); margin-left: 6px; }

  @media (max-width: 560px) {
    .page-head h1 { font-size: 22px; }
    .rank-row { grid-template-columns: 34px 64px 1fr auto; gap: 8px; }
  }
</style>
</head>

<div class="wrap">
  <header class="page-head">
    <div>
      <span class="eyebrow">RAIDAR</span>
      <h1>ランキング＆称号</h1>
    </div>
    <nav class="hero-actions">
      <a class="btn-ghost" href="index.html">🎯 監視 Monitor</a>
      <a class="btn-ghost" href="raid-calculator.html">🧮 レイド計算</a>
      <a class="btn-ghost" href="ranking.html" aria-current="page">🏆 ランキング</a>
    </nav>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="ranking" type="button">🏆 ランキング</button>
    <button class="tab" data-tab="farm" type="button">🌾 ファーム</button>
    <button class="tab" data-tab="rarity" type="button">💎 レアリティ表</button>
    <button class="tab" data-tab="titles" type="button">📜 称号一覧</button>
  </div>

  <section class="panel active" id="panel-ranking">
    <div class="card">
      <h2>レベルランキング</h2>
      <p class="sub">このブラウザに同期されているメンバーを累計EXP順に並べる。EXP＝ファーム記録＋実績称号＋IN時間。</p>
      <div class="filter-row" id="rank-filter">
        <button class="filter-btn on" data-f="all" type="button">全体</button>
        <button class="filter-btn" data-f="friend" type="button">味方</button>
        <button class="filter-btn" data-f="enemy" type="button">敵</button>
      </div>
      <div class="rank-list" id="rank-list"></div>
    </div>
  </section>

  <section class="panel" id="panel-farm">
    <div class="card">
      <div class="card-head" style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <h2 style="margin:0;">ファーム集計（名前ごとの記録数値）</h2>
        <label style="font-size:12px;color:var(--text-muted);">シーズン：

        </label>
      </div>
      <p class="sub">記録された各項目の数値の合計。多い順。</p>
      <div class="rank-list" id="farm-rank"></div>
    </div>
  </section>

  <section class="panel" id="panel-rarity">
    <div class="card">
      <h2>レアリティ表</h2>
      <p class="sub">称号にはレアリティがある。色で判別でき、上位ほど獲得EXPが大きい。</p>
      <div class="rarity-grid" id="rarity-grid"></div>
    </div>
  </section>

  <section class="panel" id="panel-titles">
    <div class="card">
      <h2>実績称号（ファーム）</h2>
      <p class="sub">資源の累計などで獲得する称号。段階ごとにレアリティ＝色＝獲得EXPが変わる。</p>
      <div id="cat-titles"></div>
    </div>
  </section>
</div>

  Array.prototype.forEach.call(document.querySelectorAll("#rank-filter .filter-btn"), function (b) {
    b.addEventListener("click", function () {
      rankFilter = b.getAttribute("data-f");
      Array.prototype.forEach.call(document.querySelectorAll("#rank-filter .filter-btn"), function (o) { o.classList.toggle("on", o === b); });
      renderRanking();
    });
  });

  // ===== レアリティ表 =====
  function renderRarity() {
    document.getElementById("rarity-grid").innerHTML = RARITIES.map(function (r) {
      return '<div class="rarity-item">' +
        '<span class="rarity-dot" style="background:' + r.color + '"></span>' +
        '<span class="rarity-name" style="color:' + r.color + '">' + esc(r.label) + '</span>' +
        '<span class="rarity-exp">獲得で +' + fmtInt(rarityExp(r.key)) + ' EXP</span>' +
      '</div>';
    }).join("");
  }

  // ===== 称号一覧 =====
  function renderTitles() {
    var ct = document.getElementById("cat-titles");
    ct.innerHTML = ACHIEVEMENTS.map(function (cat) {
      return '<div class="title-group collapsed"><button type="button" class="title-group-head"><span class="tg-arrow">▸</span> ' + esc(cat.cat) + ' <span class="tg-count">' + cat.tiers.length + '種</span></button><div class="chips">' +
        cat.tiers.map(function (ti) {
          var rc = rarityByKey(ti.rk);
          return '<span class="chip" style="color:' + rc.color + ';border-color:' + rc.color + '">' + esc(ti.n) + '<span class="rq">' + fmtInt(ti.th) + '</span><span class="xp">+' + fmtInt(rarityExp(ti.rk)) + '</span></span>';
        }).join("") + '</div></div>';
    }).join("");
    // ヘッダークリックで開閉
    Array.prototype.forEach.call(ct.querySelectorAll(".title-group-head"), function (h) {
      h.addEventListener("click", function () {
        var g = h.parentNode; g.classList.toggle("collapsed");
        var ar = h.querySelector(".tg-arrow"); if (ar) ar.textContent = g.classList.contains("collapsed") ? "▸" : "▾";
      });
    });
  }

  // ===== ファーム（名前ごとの集計＋記録一覧） =====
  var RES_NAMES = {
    sulfur_ore: "硫黄", metal_ore: "金属", hq_metal_ore: "HQ金属", stones: "石", wood: "木",
    leather: "レザー", animal_fat: "脂", bone: "骨", cloth: "布", yellow_berry: "黄ベリー",
    red_berry: "赤ベリー", blue_berry: "青ベリー", green_berry: "緑ベリー", white_berry: "白ベリー",
    mushroom: "きのこ", pumpkin: "かぼちゃ", corn: "とうもろこし", potato: "じゃがいも", wheat: "小麦",
    flowers: "花", eggs: "卵", scrap: "スクラップ", lowgrade: "低品質燃料",
    kills: "キル", headshots: "HS", bullets_hit: "命中弾", deaths: "死亡", suicides: "自殺",
    scientist_kills: "科学者", heavy_scientist: "重科学者", bradley_kills: "戦車", heli_kills: "ヘリ",
    rockets: "ロケット", c4_thrown: "C4", satchels: "サッチェル", blocks_placed: "設置", blocks_upgraded: "強化",
    crates_looted: "クレート", barrels_broken: "バレル"
  };
  var FARM_RES_IDS = ["sulfur_ore", "metal_ore", "hq_metal_ore", "stones", "wood", "leather", "animal_fat", "bone", "cloth", "yellow_berry", "red_berry", "blue_berry", "green_berry", "white_berry", "mushroom", "pumpkin", "corn", "potato", "wheat", "flowers", "eggs", "scrap", "lowgrade"];
  function fmtDate(ts) { if (typeof ts !== "number") return ""; var d = new Date(ts); return (d.getMonth() + 1) + "/" + d.getDate() + " " + d.getHours() + ":" + ("0" + d.getMinutes()).slice(-2); }
  function statSummary(res) {
    var arr = Object.keys(res || {}).map(function (k) { return { k: k, v: Number(res[k]) || 0 }; }).filter(function (x) { return x.v > 0; }).sort(function (a, b) { return b.v - a.v; });
    if (!arr.length) return "データなし";
    return arr.slice(0, 4).map(function (x) { return (RES_NAMES[x.k] || x.k) + " " + fmtInt(x.v); }).join("・") + (arr.length > 4 ? (" 他" + (arr.length - 4)) : "");
  }
  function allRawMembers() {
    var state = loadState(); var teams = (state && Array.isArray(state.teams)) ? state.teams : [];
    var out = [];
    teams.forEach(function (t) { (Array.isArray(t.members) ? t.members : []).forEach(function (m) { if (m && m.name) out.push(m); }); });
    return out;
  }
  function seasonKeysOf(members) {
    var set = {};
    members.forEach(function (m) { if (m.seasons && typeof m.seasons === "object") Object.keys(m.seasons).forEach(function (k) { set[k] = true; }); });
    var meta = loadSeasonMeta();
    return Object.keys(set).sort(function (a, b) { return ((meta[b] && meta[b].start) || 0) - ((meta[a] && meta[a].start) || 0); });
  }
  function memberSeasonData(m, season) {
    if (season === "live") {
      var totals = {};
      (Array.isArray(m.farmLogs) ? m.farmLogs : []).forEach(function (l) { var r = (l && l.resources) || {}; Object.keys(r).forEach(function (k) { totals[k] = (totals[k] || 0) + (Number(r[k]) || 0); }); });
      return { totals: totals, playMs: totalOnlineMs(m), records: (Array.isArray(m.farmLogs) ? m.farmLogs.length : 0) };
    }
    var s = (m.seasons || {})[season];
    return s ? { totals: s.totals || {}, playMs: s.playMs || 0, records: s.records || 0 } : null;
  }
  function farmSum(totals) { var s = 0; FARM_RES_IDS.forEach(function (id) { s += Number(totals[id]) || 0; }); return s; }
  function fullBreakdown(totals) {
    var arr = Object.keys(totals || {}).map(function (k) { return { k: k, v: Number(totals[k]) || 0 }; }).filter(function (x) { return x.v > 0; }).sort(function (a, b) { return b.v - a.v; });
    if (!arr.length) return "記録なし";
    return arr.map(function (x) { return (RES_NAMES[x.k] || x.k) + " " + fmtInt(x.v); }).join("・");
  }
  var currentFarmSeason = "live";
  function renderFarm() {
    var members = allRawMembers();
    var keys = seasonKeysOf(members);
    var sel = document.getElementById("farm-season");
    if (sel && sel.options.length === 0) {
      var liveKey = currentLiveKey();
      var archived = keys.filter(function (k) { return k !== liveKey; });
      var opts = '<option value="live">' + esc(seasonOptLabel(liveKey, true)) + '</option>' +
        archived.map(function (k) { return '<option value="' + esc(k) + '">' + esc(seasonOptLabel(k, false)) + '</option>'; }).join("");
      sel.innerHTML = opts;
      sel.value = "live"; currentFarmSeason = "live"; // 既定は現在シーズン
      sel.addEventListener("change", function () { currentFarmSeason = sel.value; renderFarm(); });
    }
    var rows = members.map(function (m) { var d = memberSeasonData(m, currentFarmSeason); return d && (farmSum(d.totals) > 0 || d.records > 0) ? { name: m.name, d: d } : null; }).filter(Boolean);
    var fr = document.getElementById("farm-rank");
    if (!rows.length) { fr.innerHTML = '<div class="empty">このシーズンのデータがない。監視ページでファームを記録すると集計される。</div>'; }
    else {
      rows.sort(function (a, b) { return farmSum(b.d.totals) - farmSum(a.d.totals); });
      fr.innerHTML = rows.map(function (x, i) {
        return '<div class="frank-row"><div class="rank-no">' + (i + 1) + '</div>' +
          '<div class="rank-name"><span class="nm">' + esc(x.name) + '</span>' +
            '<span class="ti tt">' + esc(fullBreakdown(x.d.totals)) + '</span></div>' +
          '<div class="rank-exp"><b>' + fmtInt(farmSum(x.d.totals)) + '</b><small>資源計・記録' + x.d.records + '回</small></div></div>';
      }).join("");
    }
  }

  Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (tab) {
    tab.addEventListener("click", function () {
      var name = tab.getAttribute("data-tab");
      Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (t) { t.classList.toggle("active", t === tab); });
      Array.prototype.forEach.call(document.querySelectorAll(".panel"), function (p) { p.classList.toggle("active", p.id === "panel-" + name); });
    });
  });

  renderRanking(); renderRarity(); renderTitles(); renderFarm();
})();
</script>
</body>
</html>
